<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <title>Jocs de Mesures</title>

    <!-- Font divertida -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f0f8ff;
        }
        h1 {
            color: #2a7ae2;
        }
        .container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            margin-top: 10px;
        }
        .card {
            background-color: white;
            padding: 20px;
            border-radius: 15px;
            width: 30%;
            min-width: 250px;
            box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }

        /* Títols divertits */
        .titol-divertit {
            font-family: 'Fredoka', sans-serif;
            font-size: 32px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .longitud {
            color: #ff6f61; /* taronja F527D6*/
        }

        .massa {
            color: #6a5acd; /* lila */
        }
        
        .capacitat {
            color: #F527D6; 
        }

        img {
            width: 100%;
            border-radius: 10px;
        }
        a {
            display: inline-block;
            margin-top: 15px;
            padding: 12px 25px;
            background-color: #2a7ae2;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-size: 18px;
        }
        a:hover {
            background-color: #1d5bbf;
        }
    </style>
</head>
<body>

    <h1 class="titol-divertit">Alumnat de quart CEIP Sanchis Guarner</h1>

    <div class="container">

        <div class="card">
            <h2 class="titol-divertit longitud">Longitud</h2>
            <img src="longitud.png" alt="Longitud">
            <p>Practica les mesures de longitud!</p>
            <a href="https://wordwall.net/es/resource/25109292/matematicas/transformación-de-unidades-de-longitud" target="_blank">Joc 1</a>
            <a href="https://wordwall.net/es/resource/24147226/medidas-de-longitud" target="_blank">Joc 2</a>
            <a href="https://wordwall.net/es/resource/15391476/conversión-de-medidas-de-longitud-4-básico" target="_blank">Joc 3</a>
            
       </div>

        <div class="card">
            <h2 class="titol-divertit capacitat">Capacitat</h2>
            <img src="capacitat.png" alt="Capacitat">
            <p>Aprèn sobre la capacitat dels líquids!</p>
            <a href="https://wordwall.net/es/resource/34057503/el-litro-y-el-mililitro" target="_blank">Joc 1</a>
            <a href="https://wordwall.net/es/resource/91570288/litros-y-mililitros" target="_blank">Joc 2</a>
            <a href="https://wordwall.net/es/resource/73027817/matemáticas/cuántos-litros-o-mililitros" target="_blank">Joc 3</a>
           
       </div>

        <div class="card">
            <h2 class="titol-divertit massa">Pes</h2>
            <img src="massa.png" alt="Massa">
            <p>Descobreix quant pesen els objectes!</p>
            <a href="https://wordwall.net/es/resource/86659684/matemáticas/kilo-medio-kilo-y-cuarto-de-kilo" target="_blank">Joc 1</a>
            <a href="https://wordwall.net/es/resource/91717151/equivalencia-entre-gramos-y-kilos" target="_blank">Joc 2</a>
            <a href="https://wordwall.net/es/resource/15942883/kilos-medios-kilos-y-cuartos-de-kilo" target="_blank">Joc 3</a>
            <a href="https://wordwall.net/es/resource/7384033/masa-kilo-medio-cuarto" target="_blank">Joc 4</a>
             <a href="https://ictgames.com/mobilePage/mostlyPostie/index.html" target="_blank">Joc 5</a>
        </div>

    </div>

</body>
</html>
